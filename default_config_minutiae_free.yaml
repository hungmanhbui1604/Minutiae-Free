general:
  seed: 42

wandb:
  api_key: null
  project: "Minutiae-Free-DINOv2"

data:
  split_path: "data/recog_splits.json"
  transform_name: "dinov2"
  n_genuine_impressions: 32
  n_impostor_impressions: 1
  impostor_mode: "all"
  n_impostor_subset: null
  gallery_per_id: 1
  probe_per_id: null

model:
  model_name: "dinov2_minutiae_free"
  variant: "base"          # small | base | large | giant
  use_registers: true
  pretrained: true
  embed_dim: null           # inferred from backbone if null
  out_dim: 65536            # paper-style DINO prototype dimension
  hidden_dim: 2048
  bottleneck_dim: 256
  freeze_backbone_epochs: 0
  ckpt_path: null

training:
  epochs: 100
  batch_size: 64            # global batch size under DDP
  num_workers: 8
  pin_memory: true
  checkpoint_interval: 10
  amp: true
  clip_grad_norm: 3.0
  teacher_momentum: 0.994
  teacher_momentum_final: 1.0

crops:
  global_size: 224
  local_size: 98
  global_crops: 2
  local_crops: 8

loss:
  student_temp: 0.10
  teacher_temp: 0.04
  center_momentum: 0.90

optimizer:
  opt_name: "adamw"
  lr: 1.0e-4
  weight_decay: 0.04

scheduler:
  sched_name: "cosine"
  min_lr: 1.0e-6
  warmup_epochs: 10

output:
  checkpoint_dir: "ckpts_minutiae_free/"
  best_model_name: "best_minutiae_free.pth"

evaluation:
  batch_size: 256
